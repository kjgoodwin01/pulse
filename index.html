function computeCycleDays(cycleStart, cycleEnd) {
  const now = new Date();
  let start = new Date(cycleStart);
  let end = new Date(cycleEnd);

  // Auto-advance: if today is past cycleEnd, roll forward month by month
  while(now >= end) {
    start = new Date(end);
    end = new Date(end);
    end.setMonth(end.getMonth() + 1);
  }

  const fmt = d => d.toISOString().split("T")[0];
  const totalDays = Math.round((end - start) / 86400000);
  const daysElapsed = Math.min(Math.max(Math.round((now - start) / 86400000), 1), totalDays);
  const daysRemaining = Math.max(totalDays - daysElapsed, 0);
  return { totalDays, daysElapsed, daysRemaining, cycleStart: fmt(start), cycleEnd: fmt(end) };
}

// Parses Discover push notification text
// Format: "A transaction of $10.60 has been initiated at ANTHROPIC on April 08, 2026. Tap to view."
function parseDiscoverNotif(text) {
  if (!text) return null;
  // Amount: match "$XX.XX" pattern
  const amtMatch = text.match(/\$(\d{1,6}(?:\.\d{2})?)/);
  if (!amtMatch) return null; // Amount is required
  const amount = parseFloat(amtMatch[1]);

  // Merchant: between "at " and " on [Month]" or " on [date]" or end
  // Covers: "at ANTHROPIC on April 08" and "at AMAZON MKTPLACE PMTS on April 08"
  const merchantMatch = text.match(/at\s+(.+?)\s+on\s+(?:January|February|March|April|May|June|July|August|September|October|November|December|\d)/i);
  const merchant = merchantMatch ? merchantMatch[1].trim() : "Unknown Merchant";

  // Date: look for "Month DD, YYYY" pattern
  const dateMatch = text.match(/(January|February|March|April|May|June|July|August|September|October|November|December)\s+(\d{1,2}),?\s+(\d{4})/i);
  let date = new Date().toISOString().split("T")[0];
  if (dateMatch) {
    const months = {january:"01",february:"02",march:"03",april:"04",may:"05",june:"06",july:"07",august:"08",september:"09",october:"10",november:"11",december:"12"};
    const m = months[dateMatch[1].toLowerCase()];
    const d = dateMatch[2].padStart(2,"0");
    date = `${dateMatch[3]}-${m}-${d}`;
  }

  const cat = autoCat(merchant);
  return { amount, desc: merchant, date, cat };
}

// ── ANIMATED NUMBER ──────────────────────────────────────────────────────────
function Num({value,prefix="$",d=2,color="#fff",className="",style:sx}) {
  const [disp,setDisp]=useState(value);const prev=useRef(value);const raf=useRef();
  useEffect(()=>{
    const s=prev.current,e=value,t0=performance.now();
    const go=now=>{const p=Math.min((now-t0)/900,1);setDisp(s+(e-s)*(1-Math.pow(1-p,4)));if(p<1)raf.current=requestAnimationFrame(go);};
    raf.current=requestAnimationFrame(go);prev.current=value;return()=>cancelAnimationFrame(raf.current);
  },[value]);
  const str=d>0?disp.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d}):Math.round(disp).toLocaleString("en-US");
  return <span className={className} style={{color,fontFamily:"'JetBrains Mono',monospace",...(sx||{})}}>{prefix}{str}</span>;
}

        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke+6} strokeDasharray={`2 ${circ}`} strokeDashoffset={off} strokeLinecap="round" opacity={0.3} style={{filter:"blur(4px)",transition:"stroke-dashoffset 1.2s cubic-bezier(0.16,1,0.3,1)"}}/>

// ── AVALANCHE SIM ────────────────────────────────────────────────────────────
function sim(loans,pmt) {
  if(!loans.length||pmt<=0) return {mo:0,ti:0,pd:{},sn:[]};
  const a=loans.map(l=>({...l})).sort((x,y)=>y.rate-x.rate);
  let mo=0,ti=0;const sn=[],pd={};
  sn.push({m:0,...Object.fromEntries(a.map(l=>[l.name,l.balance]))});
  while(a.some(l=>l.balance>0.01)&&mo<360){
    mo++;a.forEach(l=>{if(l.balance>0){const i=l.balance*(l.rate/12);l.balance+=i;ti+=i;}});
    let r=pmt;a.forEach(l=>{if(l.balance>0){const p=Math.min(l.min,l.balance);l.balance-=p;r-=p;}});
    for(const l of a){if(l.balance>0&&r>0){const p=Math.min(r,l.balance);l.balance-=p;r-=p;break;}}
    a.forEach(l=>{if(l.balance<=0.01&&!pd[l.name]){pd[l.name]=mo;l.balance=0;}});
    sn.push({m:mo,...Object.fromEntries(a.map(l=>[l.name,Math.max(0,l.balance)]))});
  }
  return {mo,ti,pd,sn};
}

function ScanModal({mode, onClose, onImport}) {
  const [status,setStatus]=useState("idle"); // idle | processing | done | error
  const [preview,setPreview]=useState(null);
  const [parsed,setParsed]=useState([]);
  const [errorMsg,setErrorMsg]=useState("");
  const fileRef=useRef();

  const processImage=async(file)=>{
    if(!getApiKey()){setErrorMsg("No API key set. Tap KG → Settings → paste your Anthropic API key.");setStatus("error");return;}
    console.log("Using key:", getApiKey().slice(0,12)+"...");
    setStatus("processing");
    try {
      const b64=await new Promise((res,rej)=>{
        const r=new FileReader();
        r.onload=()=>res(r.result.split(",")[1]);
        r.onerror=rej;
        r.readAsDataURL(file);
      });
      setPreview(URL.createObjectURL(file));

      const resp=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":getApiKey(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1000,
          messages:[{
            role:"user",
            content:[
              {type:"image",source:{type:"base64",media_type:file.type||"image/jpeg",data:b64}},
              {type:"text",text:`Look at this image and extract every transaction you can see, including pending ones.
Return ONLY a JSON array with no other text, markdown, or explanation.
Each object must have exactly these fields:
- "date": "YYYY-MM-DD" (use 2026 if year not shown)
- "desc": merchant name in UPPERCASE
- "amount": number only, no dollar sign, always positive

Example output: [{"date":"2026-04-08","desc":"ANTHROPIC","amount":8.48},{"date":"2026-04-08","desc":"ANTHROPIC","amount":10.60}]

Include ALL transactions visible, even if marked Pending. Return [] only if there are truly zero transactions in the image.`}
            ]
          }]
        })
      });

      if(!resp.ok) {
        const errBody = await resp.text();
        console.error("API error:", resp.status, errBody);
        throw new Error(`API error ${resp.status}: ${errBody.slice(0,200)}`);
      }

      const d=await resp.json();
      console.log("API response:", JSON.stringify(d));
      const text=d.content?.[0]?.text||"[]";
      console.log("Extracted text:", text);
      const clean=text.replace(/```json|```/g,"").trim();
      const txns=JSON.parse(clean);

      // Auto-categorize each transaction
      const categorized=txns.map(t=>({...t,cat:autoCat(t.desc)}));
      setParsed(categorized);
      setStatus("done");
    } catch(e) {
      console.error("Scan error:", e);
      setErrorMsg(e.message||"Couldn't parse the image. Try a clearer photo.");
      setStatus("error");
    }
  };

  const handleFile=(e)=>{
    const file=e.target.files?.[0];
    if(file) processImage(file);

    onImport(parsed);
  };

  if(!mode) return null;
  return (
    <div className="fixed inset-0 z-[100] flex items-end justify-center" onClick={status==="idle"?onClose:undefined}>
      <div className="absolute inset-0 bg-black/60 backdrop-blur-sm"/>
      <div className="relative w-full max-w-lg rounded-t-3xl overflow-hidden" style={{background:"#0F172A",border:`1px solid rgba(255,255,255,0.05)`,borderBottom:"none",maxHeight:"90vh"}}

          {status==="idle"&&(
            <div>
              <div onClick={()=>fileRef.current?.click()} className="flex flex-col items-center justify-center rounded-2xl cursor-pointer transition active:scale-[0.98]"
                style={{background:"rgba(255,255,255,0.03)",border:"1.5px dashed rgba(255,255,255,0.1)",padding:"48px 24px"}}>
                <div className="w-16 h-16 rounded-2xl flex items-center justify-center mb-4" style={{background:mode==="camera"?"rgba(99,102,241,0.15)":"rgba(56,189,248,0.15)"}}>
                  {mode==="camera"
                    ? <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke={C.blue} strokeWidth="1.6"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
                    : <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke={C.emerald} strokeWidth="1.6"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>

          )}

          {status==="error"&&(
            <div className="flex flex-col items-center py-8">
              <div className="w-12 h-12 rounded-full flex items-center justify-center mb-4" style={{background:"rgba(248,113,113,0.15)"}}>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={C.red} strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              </div>
              <p className="text-sm font-semibold text-white mb-1">Scan Failed</p>
              <p className="text-xs text-center mb-5" style={{color:C.muted}}>{errorMsg}</p>

          {status==="done"&&(
            <div>
              {preview&&<img src={preview} alt="" className="w-full rounded-xl mb-4 opacity-60" style={{maxHeight:"140px",objectFit:"cover"}}/>}
              {parsed.length===0?(

                  <p className="text-sm text-white mb-1">No transactions found</p>
                  <p className="text-xs mb-4" style={{color:C.muted}}>Try a clearer image showing transaction amounts and merchants</p>

                    <span className="text-xs font-bold" style={{color:C.emerald,fontFamily:"'JetBrains Mono',monospace"}}>
                      {$(parsed.reduce((s,t)=>s+t.amount,0))}
                    </span>
                  </div>
                  <div className="rounded-2xl overflow-hidden mb-4" style={{border:`1px solid ${C.border}`}}>
                    {parsed.map((t,i)=>(
                      <div key={i} className="flex items-center gap-3 px-4 py-3" style={{borderBottom:i<parsed.length-1?`1px solid ${C.border}`:"none"}}>
                        <div className="w-2 h-2 rounded-full flex-shrink-0" style={{background:C.cats[t.cat]||C.muted}}/>
                        <div className="flex-1 min-w-0">
                          <p className="text-xs font-semibold text-white truncate">{t.desc}</p>
                          <p className="text-[10px]" style={{color:C.muted}}>{t.cat} · {t.date}</p>
                        </div>
                        <span className="text-xs font-bold text-white" style={{fontFamily:"'JetBrains Mono',monospace"}}>{$(t.amount)}</span>
                      </div>
                    ))}
                  </div>
                  <Btn full onClick={handleImport} color={C.emerald}>Import All {parsed.length} Transactions</Btn>
                  <button onClick={()=>setStatus("idle")} className="w-full mt-2 py-3 text-sm" style={{color:C.muted}}>Scan Again</button>
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── HOME ─────────────────────────────────────────────────────────────────────

  const [editing,setEditing]=useState(false);const [tmp,setTmp]=useState("");const [chkEditing,setChkEditing]=useState(false);const [chkTmp,setChkTmp]=useState("");

  const safeW=Math.min(safe*7,rem);const burn=spent/data.daysElapsed;const pace=data.cycleTarget/data.totalDays;const proj=burn*data.totalDays;
  const wc=sc(safeW,50,15),rc=rem>0?C.emerald:C.red;

              <button onClick={()=>{onUpdate({...data,checkingBalance:parseFloat(chkTmp)||0});setChkEditing(false);}} className="text-[10px] font-bold tracking-wider px-3 py-1.5 rounded-lg transition" style={{color:C.emerald,background:`${C.emerald}15`}}>SET</button>
            </div>

            <button onClick={()=>{setChkTmp((data.checkingBalance||0).toFixed(2));setChkEditing(true);}} className="flex items-center gap-1 text-sm font-semibold transition" style={{color:C.emerald}}>

            </button>

      </G>
      <div className="flex justify-center my-4"><Ring spent={spent} target={data.cycleTarget} daysRemaining={data.daysRemaining} size={240} stroke={12}/></div>
      <div className="flex gap-3">
        <G className="flex-1 text-center" p="py-4 px-3"><Num value={safeW} className="text-xl font-bold" color={wc}/><p className="text-[8px] font-bold tracking-[0.2em] mt-1" style={{color:C.dim}}>THIS WEEK</p></G>
        <G className="flex-1 text-center" p="py-4 px-3"><Num value={rem} className="text-xl font-bold" color={rc}/><p className="text-[8px] font-bold tracking-[0.2em] mt-1" style={{color:C.dim}}>REMAINING</p></G>

      </G>
      <div className="mt-5 mb-1 flex items-center justify-between"><span className="text-[10px] font-bold tracking-[0.2em]" style={{color:C.dim}}>RECENT</span></div>
      {data.transactions.slice(0,5).map((t,i)=>(
        <div key={i} className="flex items-center py-3" style={{borderBottom:i<4?`1px solid ${C.border}`:"none"}}>
          <div className="w-8 h-8 rounded-xl flex items-center justify-center mr-3" style={{background:`${C.cats[t.cat]||C.muted}15`}}><div className="w-2 h-2 rounded-full" style={{background:C.cats[t.cat]||C.muted}}/></div>
          <div className="flex-1 min-w-0"><p className="text-sm text-gray-300 truncate">{t.desc}</p><p className="text-[10px]" style={{color:C.muted}}>{t.cat}</p></div>
          <span className="text-sm font-bold text-white ml-2" style={{fontFamily:"'JetBrains Mono',monospace"}}>{$(t.amount)}</span>
        </div>
      ))}

      

      {/* Add Menu Modal */}

            <div className="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0" style={{background:"rgba(99,102,241,0.15)"}}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={C.blue} strokeWidth="1.8"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
            </div>
            <div className="text-left">

            <div className="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0" style={{background:"rgba(56,189,248,0.15)"}}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={C.emerald} strokeWidth="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>

            <div className="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0" style={{background:"rgba(255,255,255,0.05)"}}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={C.muted} strokeWidth="1.8"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>

// ── SPEND (Activity + Velocity combined) ─────────────────────────────────────
function SpendTab({data}) {
  const [q,setQ]=useState("");const txn=data.transactions;
  const fil=txn.filter(t=>(t.desc+t.cat).toLowerCase().includes(q.toLowerCase()));
  const total=txn.reduce((s,t)=>s+t.amount,0);
  const cats=useMemo(()=>{const m={};txn.forEach(t=>{m[t.cat]=(m[t.cat]||0)+t.amount;});return Object.entries(m).sort((a,b)=>b[1]-a[1]);},[txn]);
  const burn=data.balance/data.daysElapsed;const pace=data.cycleTarget/data.totalDays;
  const proj=burn*data.totalDays;const ratio=burn/pace;const surplus=data.cycleTarget-proj;
  let ps,pcolor;if(ratio<=0.85){ps="UNDER";pcolor=C.emerald;}else if(ratio<=1.05){ps="ON PACE";pcolor=C.blue;}else if(ratio<=1.20){ps="WATCH";pcolor=C.amber;}else{ps="OVER";pcolor=C.red;}
  const daily=useMemo(()=>{const m={};data.transactions.forEach(t=>{const d=parseInt(t.date.slice(-2));m[d]=(m[d]||0)+t.amount;});let cum=0;return Array.from({length:data.daysElapsed},(_,i)=>{const d=15+i;const v=m[d]||0;cum+=v;return{d:`${d}`,v,cum,p:pace*(i+1)};});},[data,pace]);
  return (
    <S className="px-5 pb-10">
      <div className="mt-4 relative">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#475569" strokeWidth="2" className="absolute left-3.5 top-1/2 -translate-y-1/2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search transactions..." className="w-full rounded-xl pl-11 pr-4 py-3 text-sm text-white placeholder-gray-600 outline-none transition" style={{background:C.surface,border:`1px solid ${C.border}`}}/>
      </div>
      <div className="mt-5 space-y-3">{cats.map(([cat,amt])=>(<div key={cat}><div className="flex items-center justify-between mb-1.5"><div className="flex items-center gap-2"><div className="w-2 h-2 rounded-full" style={{background:C.cats[cat]||C.muted}}/><span className="text-xs" style={{color:C.muted}}>{cat}</span></div><div className="flex items-center gap-2"><span className="text-[10px]" style={{color:C.dim}}>{pc(amt/total)}</span><span className="text-xs font-bold text-white" style={{fontFamily:"'JetBrains Mono',monospace"}}>{$(amt)}</span></div></div><div className="h-1 rounded-full overflow-hidden" style={{background:C.faint}}><div className="h-full rounded-full transition-all duration-700" style={{width:`${(amt/total)*100}%`,background:C.cats[cat]||C.muted}}/></div></div>))}</div>
      <div className="mt-6">{fil.map((t,i)=>(<div key={i} className="flex items-center py-3" style={{borderBottom:i<fil.length-1?`1px solid ${C.border}`:"none"}}><div className="w-9 h-9 rounded-xl flex items-center justify-center mr-3" style={{background:`${C.cats[t.cat]||C.muted}12`}}><div className="w-2.5 h-2.5 rounded-full" style={{background:C.cats[t.cat]||C.muted}}/></div><div className="flex-1 min-w-0"><p className="text-sm text-gray-200 truncate">{t.desc}</p><span className="text-[10px]" style={{color:C.muted}}>{t.date.slice(5).replace("-","/")} · {t.cat}</span></div><span className="text-sm font-bold text-white" style={{fontFamily:"'JetBrains Mono',monospace"}}>{$(t.amount)}</span></div>))}</div>

      <div className="mt-8 mb-4 flex items-center gap-3">
        <div className="h-px flex-1" style={{background:C.border}}/>
        <span className="text-[10px] font-bold tracking-[0.2em]" style={{color:C.dim}}>VELOCITY</span>
        <div className="h-px flex-1" style={{background:C.border}}/>
      </div>
      <div className="flex justify-center mb-4"><div className="flex items-center gap-2 px-5 py-2 rounded-full" style={{background:`${pcolor}10`,border:`1px solid ${pcolor}20`}}><div className="relative w-2.5 h-2.5"><div className="absolute inset-0 rounded-full animate-ping opacity-30" style={{background:pcolor}}/><div className="w-2.5 h-2.5 rounded-full" style={{background:pcolor}}/></div><span className="text-xs font-bold tracking-[0.15em]" style={{color:pcolor}}>{ps}</span><span className="text-[10px]" style={{color:C.dim}}>{Math.round(ratio*100)}%</span></div></div>
      <div className="flex gap-3"><G className="flex-1 text-center" p="py-5 px-3" glow={`${pcolor}10`}><Num value={burn} className="text-3xl font-bold" color={C.text}/><p className="text-[8px] font-bold tracking-[0.2em] mt-2" style={{color:C.dim}}>BURN / DAY</p></G><G className="flex-1 text-center" p="py-5 px-3" glow={`${pcolor}10`}><Num value={proj} className="text-3xl font-bold" color={pcolor}/><p className="text-[8px] font-bold tracking-[0.2em] mt-2" style={{color:C.dim}}>PROJECTED</p></G></div>
      <G className="mt-3" p="px-4 py-3"><div className="flex justify-between py-1.5" style={{borderBottom:`1px solid ${C.border}`}}><span className="text-xs" style={{color:C.muted}}>Budget pace</span><span className="text-xs" style={{color:C.muted,fontFamily:"'JetBrains Mono',monospace"}}>{$(pace)}/day</span></div><div className="flex justify-between py-1.5"><span className="text-xs" style={{color:C.muted}}>{surplus>=0?"Under by":"Over by"}</span><span className="text-xs font-bold" style={{color:surplus>=0?C.emerald:C.red,fontFamily:"'JetBrains Mono',monospace"}}>{$(Math.abs(surplus))}</span></div></G>
      <div className="mt-5"><span className="text-[10px] font-bold tracking-[0.2em]" style={{color:C.dim}}>CUMULATIVE</span><G className="mt-2" p="p-3"><ResponsiveContainer width="100%" height={190}><AreaChart data={daily}><defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.blue} stopOpacity={0.2}/><stop offset="100%" stopColor={C.blue} stopOpacity={0}/></linearGradient></defs><XAxis dataKey="d" tick={{fill:C.dim,fontSize:10}} axisLine={false} tickLine={false}/><YAxis tick={{fill:C.dim,fontSize:10}} axisLine={false} tickLine={false} tickFormatter={v=>`$${v}`} width={36}/><Tooltip content={<Tip/>}/><Area type="monotone" dataKey="p" stroke={C.faint} strokeWidth={1.5} strokeDasharray="5 4" fill="none" name="Pace"/><Area type="monotone" dataKey="cum" stroke={C.blue} strokeWidth={2.5} fill="url(#cg)" name="Actual"/></AreaChart></ResponsiveContainer></G></div>
      <div className="mt-4"><span className="text-[10px] font-bold tracking-[0.2em]" style={{color:C.dim}}>DAILY</span><G className="mt-2" p="p-3"><ResponsiveContainer width="100%" height={130}><BarChart data={daily}><XAxis dataKey="d" tick={{fill:C.dim,fontSize:10}} axisLine={false} tickLine={false}/><YAxis tick={{fill:C.dim,fontSize:10}} axisLine={false} tickLine={false} tickFormatter={v=>`$${v}`} width={36}/><Tooltip content={<Tip/>}/><Bar dataKey="v" radius={[4,4,0,0]} name="Daily">{daily.map((d,i)=><Cell key={i} fill={d.v>pace?C.red:C.blue} fillOpacity={0.7}/>)}</Bar></BarChart></ResponsiveContainer></G></div>
    </S>
  );
}

// ── LOANS (INTERACTIVE) ──────────────────────────────────────────────────────
function LoansTab({data,onUpdate}) {
  const [addOpen,setAddOpen]=useState(false);
  const [payOpen,setPayOpen]=useState(null); // loan id
  const [payAmt,setPayAmt]=useState("");
  const [newLoan,setNewLoan]=useState({name:"",balance:"",rate:"",min:""});

  const s=useMemo(()=>sim(data.loans,data.loanPayment),[data.loans,data.loanPayment]);
  const total=data.loans.reduce((a,l)=>a+l.balance,0);
  const sorted=[...data.loans].sort((a,b)=>b.rate-a.rate);
  const mn=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const pd=m=>{const d=new Date();d.setMonth(d.getMonth()+m);return`${mn[d.getMonth()]} ${d.getFullYear()}`;};
  const cd=s.sn.map(snap=>({m:snap.m,...snap}));

  const handleAddLoan=()=>{
    const loan={id:`l${Date.now()}`,name:newLoan.name,balance:parseFloat(newLoan.balance)||0,rate:(parseFloat(newLoan.rate)||0)/100,min:parseFloat(newLoan.min)||0};
    if(!loan.name||!loan.balance) return;
    onUpdate({...data,loans:[...data.loans,loan]});
    setNewLoan({name:"",balance:"",rate:"",min:""});setAddOpen(false);
  };

  const handleRemoveLoan=(id)=>{
    onUpdate({...data,loans:data.loans.filter(l=>l.id!==id)});
  };

  const handlePayment=()=>{
    const amt=parseFloat(payAmt)||0;if(!amt||!payOpen) return;
    const updated=data.loans.map(l=>l.id===payOpen?{...l,balance:Math.max(0,l.balance-amt)}:l).filter(l=>l.balance>0);
    onUpdate({...data,loans:updated});setPayOpen(null);setPayAmt("");
  };

  return (
    <S className="px-5 pb-10">
      <G className="mt-5" p="p-6" glow="#ef444412">
        <div className="flex justify-between items-start">
          <div><span className="text-[10px] font-bold tracking-[0.2em]" style={{color:C.dim}}>TOTAL DEBT</span><div className="mt-1"><Num value={total} className="text-3xl font-bold" color={C.red}/></div></div>
          <div className="text-right"><span className="text-[10px] font-bold tracking-[0.2em]" style={{color:C.dim}}>DEBT-FREE</span><div className="mt-1 text-2xl font-bold" style={{color:C.emerald,fontFamily:"'JetBrains Mono',monospace"}}>{s.mo>0?pd(s.mo):"—"}</div></div>
        </div>
        <div className="flex gap-5 mt-4 pt-4" style={{borderTop:`1px solid ${C.border}`}}>
          {[["Payment",$(data.loanPayment),C.text],["Interest",$(s.ti),C.amber],["Months",""+s.mo,C.text]].map(([l,v,c])=>(
            <div key={l}><p className="text-[10px]" style={{color:C.dim}}>{l}</p><p className="text-sm font-bold" style={{color:c,fontFamily:"'JetBrains Mono',monospace"}}>{v}</p></div>
          ))}
        </div>
      </G>

      <div className="mt-5 mb-2 flex items-center justify-between">
        <span className="text-[10px] font-bold tracking-[0.2em]" style={{color:C.dim}}>AVALANCHE ORDER</span>
        <button onClick={()=>setAddOpen(true)} className="text-[10px] font-bold tracking-wider px-3 py-1 rounded-full transition" style={{color:C.blue,background:`${C.blue}15`}}>+ ADD LOAN</button>
      </div>

      {sorted.map((l,i)=>{
        const t=i===0,pm=s.pd[l.name]||s.mo;
        return <G key={l.id||l.name} className="mb-2" p="p-4" glow={t?"#ef444410":undefined}>
          <div className="flex items-center gap-3">
            <div className="w-1 h-12 rounded-full" style={{background:LC[i%LC.length]}}/>
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2"><span className="text-sm font-semibold text-gray-200">{l.name}</span>{t&&<span className="text-[8px] font-bold px-2 py-0.5 rounded-full tracking-wider" style={{color:C.red,background:"rgba(239,68,68,0.1)"}}>TARGET</span>}</div>
              <span className="text-[10px]" style={{color:C.muted}}>{(l.rate*100).toFixed(2)}% · Min {$(l.min)}</span>
            </div>
            <div className="text-right"><span className="text-sm font-bold text-white" style={{fontFamily:"'JetBrains Mono',monospace"}}>{$(l.balance)}</span><p className="text-[10px] font-semibold" style={{color:C.emerald}}>{pd(pm)}</p></div>
          </div>
          {/* Action buttons */}
          <div className="flex gap-2 mt-3 ml-4">
            <button onClick={()=>{setPayOpen(l.id||l.name);setPayAmt("");}} className="text-[10px] font-bold tracking-wider px-3 py-1.5 rounded-lg transition" style={{color:C.emerald,background:`${C.emerald}12`}}>MAKE PAYMENT</button>
            <button onClick={()=>handleRemoveLoan(l.id||l.name)} className="text-[10px] font-bold tracking-wider px-3 py-1.5 rounded-lg transition" style={{color:C.red,background:`${C.red}10`}}>REMOVE</button>
          </div>
        </G>;
      })}

      {data.loans.length>0&&<div className="mt-4"><span className="text-[10px] font-bold tracking-[0.2em]" style={{color:C.dim}}>PAYOFF WATERFALL</span>
        <G className="mt-2" p="p-3"><ResponsiveContainer width="100%" height={200}><AreaChart data={cd}><defs>{sorted.map((l,i)=><linearGradient key={l.name} id={`lc${i}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={LC[i%LC.length]} stopOpacity={0.45}/><stop offset="100%" stopColor={LC[i%LC.length]} stopOpacity={0.03}/></linearGradient>)}</defs><XAxis dataKey="m" tick={{fill:C.dim,fontSize:10}} axisLine={false} tickLine={false}/><YAxis tick={{fill:C.dim,fontSize:10}} axisLine={false} tickLine={false} tickFormatter={v=>`$${(v/1000).toFixed(0)}k`} width={36}/><Tooltip content={<Tip/>}/>{[...sorted].reverse().map((l,i)=><Area key={l.name} type="monotone" dataKey={l.name} stackId="1" stroke="none" fill={`url(#lc${sorted.length-1-i})`}/>)}</AreaChart></ResponsiveContainer></G>
      </div>}

      {/* Add Loan Modal */}
      <Modal open={addOpen} onClose={()=>setAddOpen(false)} title="Add Student Loan">
        <Input label="LOAN NAME" value={newLoan.name} onChange={v=>setNewLoan({...newLoan,name:v})} placeholder="e.g. 1-06 Direct Sub"/>
        <Input label="CURRENT BALANCE" type="number" value={newLoan.balance} onChange={v=>setNewLoan({...newLoan,balance:v})} placeholder="5000.00"/>
        <Input label="INTEREST RATE (%)" type="number" value={newLoan.rate} onChange={v=>setNewLoan({...newLoan,rate:v})} placeholder="4.74"/>
        <Input label="MINIMUM PAYMENT" type="number" value={newLoan.min} onChange={v=>setNewLoan({...newLoan,min:v})} placeholder="50.00"/>
        <Btn full onClick={handleAddLoan} className="mt-2">Add Loan</Btn>
      </Modal>

      {/* Payment Modal */}
      <Modal open={!!payOpen} onClose={()=>setPayOpen(null)} title="Record Payment">
        <p className="text-xs mb-3" style={{color:C.muted}}>Enter the payment amount to deduct from the loan balance. The avalanche model will recalculate automatically.</p>
        <Input label="PAYMENT AMOUNT" type="number" value={payAmt} onChange={setPayAmt} placeholder="3450.00"/>
        <Btn full onClick={handlePayment} color={C.emerald} className="mt-2">Apply Payment</Btn>
      </Modal>
    </S>
  );
}

// ── HEALTH (INTERACTIVE) ─────────────────────────────────────────────────────
function HealthTab({data,onUpdate}) {
  const [addOpen,setAddOpen]=useState(false);
  const [newItem,setNewItem]=useState({name:"",amount:""});

  const tf=Object.values(data.fixed).reduce((s,v)=>s+v,0);
  const surplus=data.monthlyIncome-tf-data.cycleTarget;
  const ratio=(tf+data.cycleTarget)/data.monthlyIncome;
  const pie=[{n:"Fixed",v:tf,c:C.red},{n:"Variable",v:data.cycleTarget,c:C.blue},{n:"Surplus",v:Math.max(surplus,0),c:C.emerald}];

  const handleAdd=()=>{
    if(!newItem.name||!newItem.amount) return;
    const updated={...data,fixed:{...data.fixed,[newItem.name]:parseFloat(newItem.amount)||0}};
    onUpdate(updated);setNewItem({name:"",amount:""});setAddOpen(false);
  };

  const handleRemove=(name)=>{
    const f={...data.fixed};delete f[name];
    onUpdate({...data,fixed:f});
  };

  return (
    <S className="px-5 pb-10">
      <G className="mt-5 text-center" p="p-6">
        <span className="text-[10px] font-bold tracking-[0.2em]" style={{color:C.dim}}>NET INCOME</span>
        <div className="mt-1"><Num value={data.monthlyIncome} className="text-4xl font-bold" color={C.text}/></div>
        <div className="flex items-center justify-center mt-4">
          <ResponsiveContainer width={150} height={150}><PieChart><Pie data={pie} cx="50%" cy="50%" innerRadius={48} outerRadius={68} dataKey="v" strokeWidth={0}>{pie.map((d,i)=><Cell key={i} fill={d.c}/>)}</Pie></PieChart></ResponsiveContainer>
          <div className="ml-4 space-y-2 text-left">{pie.map((d,i)=><div key={i} className="flex items-center gap-2"><div className="w-2 h-2 rounded-full" style={{background:d.c}}/><span className="text-[10px]" style={{color:C.muted}}>{d.n}</span><span className="text-xs font-bold text-white" style={{fontFamily:"'JetBrains Mono',monospace"}}>{$(d.v)}</span></div>)}</div>
        </div>
      </G>

      <G className="mt-3" p="px-4 py-1">
        {[["Fixed obligations",$(tf),C.red,true],["Variable budget",$(data.cycleTarget),C.blue,false],["Monthly surplus",$(surplus),surplus>=0?C.emerald:C.red,true],["Commitment",pc(ratio),ratio>0.9?C.red:C.amber,false]].map(([l,v,c,b],i)=>(
          <div key={i} className="flex justify-between py-3" style={{borderBottom:i<3?`1px solid ${C.border}`:"none"}}><span className="text-xs" style={{color:C.muted}}>{l}</span><span className={`text-xs ${b?'font-bold':''}`} style={{color:c,fontFamily:"'JetBrains Mono',monospace"}}>{v}</span></div>
        ))}
      </G>

      <div className="mt-5 mb-2 flex items-center justify-between">
        <span className="text-[10px] font-bold tracking-[0.2em]" style={{color:C.dim}}>OBLIGATIONS</span>
        <button onClick={()=>setAddOpen(true)} className="text-[10px] font-bold tracking-wider px-3 py-1 rounded-full transition" style={{color:C.blue,background:`${C.blue}15`}}>+ ADD</button>
      </div>
      <G p="px-4 py-0">
        {Object.entries(data.fixed).map(([n,c],i,a)=>(
          <div key={n} className="flex items-center justify-between py-3" style={{borderBottom:i<a.length-1?`1px solid ${C.border}`:"none"}}>
            <span className="text-xs" style={{color:C.muted}}>{n}</span>
            <div className="flex items-center gap-3">
              <span className="text-xs" style={{color:C.text,fontFamily:"'JetBrains Mono',monospace"}}>{$(c)}</span>
              <button onClick={()=>handleRemove(n)} className="w-5 h-5 rounded-full flex items-center justify-center text-[10px] transition" style={{color:C.red,background:`${C.red}10`}}>✕</button>
            </div>
          </div>
        ))}
        <div className="flex justify-between py-3" style={{borderTop:`1px solid rgba(255,255,255,0.08)`,background:"rgba(255,255,255,0.015)",margin:"0 -16px",padding:"12px 16px"}}>
          <span className="text-xs font-bold" style={{color:C.text}}>Total</span><span className="text-xs font-bold text-white" style={{fontFamily:"'JetBrains Mono',monospace"}}>{$(tf)}</span>
        </div>
      </G>

      <Modal open={addOpen} onClose={()=>setAddOpen(false)} title="Add Fixed Obligation">
        <Input label="NAME" value={newItem.name} onChange={v=>setNewItem({...newItem,name:v})} placeholder="e.g. Gym Membership"/>
        <Input label="MONTHLY AMOUNT" type="number" value={newItem.amount} onChange={v=>setNewItem({...newItem,amount:v})} placeholder="49.99"/>
        <Btn full onClick={handleAdd} className="mt-2">Add Obligation</Btn>
      </Modal>
    </S>
  );
}

// ── PLAN (Simulator + AI Advisor) ────────────────────────────────────────────
function PlanTab({data,onUpdate}) {
  const [addOpen,setAddOpen]=useState(false);
  const [newExp,setNewExp]=useState({desc:"",amount:"",date:"",cat:"Other"});
  const [messages,setMessages]=useState([]);
  const [input,setInput]=useState("");
  const [aiLoading,setAiLoading]=useState(false);
  const messagesEndRef=useRef();

  const planned=data.plannedExpenses||[];
  const totalPlanned=planned.reduce((s,e)=>s+e.amount,0);
  const projChecking=(data.checkingBalance||0)-totalPlanned;
  const budgetRemaining=Math.max(0,data.cycleTarget-data.balance);
  const projBudget=budgetRemaining-planned.filter(e=>e.date>=data.cycleStart&&e.date<=data.cycleEnd).reduce((s,e)=>s+e.amount,0);

  const handleAddExpense=()=>{
    if(!newExp.desc||!newExp.amount) return;
    const exp={id:`p${Date.now()}`,desc:newExp.desc.toUpperCase(),amount:parseFloat(newExp.amount)||0,date:newExp.date||new Date().toISOString().split("T")[0],cat:newExp.cat};
    onUpdate({...data,plannedExpenses:[...planned,exp]});
    setNewExp({desc:"",amount:"",date:"",cat:"Other"});setAddOpen(false);
  };

  const handleRemove=(id)=>onUpdate({...data,plannedExpenses:planned.filter(e=>e.id!==id)});

  const buildContext=()=>{
    const tf=Object.values(data.fixed).reduce((s,v)=>s+v,0);
    const surplus=data.monthlyIncome-tf-data.cycleTarget;
    const totalDebt=data.loans.reduce((s,l)=>s+l.balance,0);
    const burn=data.balance/data.daysElapsed;
    const proj=burn*data.totalDays;
    return `You are a personal financial advisor. Here is the user's current financial snapshot:

CASH POSITION:
- Checking balance: ${$(data.checkingBalance||0)}
- Discover card spent this cycle: ${$(data.balance)} of ${$(data.cycleTarget)} budget (${data.daysRemaining} days left)
- Remaining budget this cycle: ${$(budgetRemaining)}
- Burn rate: ${$(burn)}/day vs ${$(data.cycleTarget/data.totalDays)}/day pace
- Projected cycle total: ${$(proj)} (${proj>data.cycleTarget?"OVER":"under"} budget)

MONTHLY INCOME & OBLIGATIONS:
- Income: ${$(data.monthlyIncome)}
- Fixed obligations: ${$(tf)} | Variable budget: ${$(data.cycleTarget)} | Surplus: ${$(surplus)}

STUDENT LOANS (Total: ${$(totalDebt)}):
${data.loans.map(l=>`- ${l.name}: ${$(l.balance)} at ${(l.rate*100).toFixed(2)}% (min ${$(l.min)})`).join("\n")}

PLANNED UPCOMING EXPENSES:
${planned.length>0?planned.map(e=>`- ${e.desc}: ${$(e.amount)} on ${e.date} [${e.cat}]`).join("\n"):"None"}
Projected checking after planned expenses: ${$(projChecking)}

RECENT TRANSACTIONS (last ${Math.min(data.transactions.length,8)}):
${data.transactions.slice(0,8).map(t=>`- ${t.date}: ${t.desc} ${$(t.amount)} [${t.cat}]`).join("\n")}

Be direct, specific, and reference their actual numbers. Keep responses concise and actionable.`;
  };

  const sendMessage=async(userMsg)=>{
    if(!userMsg.trim()) return;
    if(!getApiKey()){setMessages(m=>[...m,{role:"assistant",content:"No API key set. Tap the KG button → Settings and paste your Anthropic API key."}]);return;}
    const newMessages=[...messages,{role:"user",content:userMsg}];
    setMessages(newMessages);setInput("");setAiLoading(true);
    try {
      const resp=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":getApiKey(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1024,system:buildContext(),messages:newMessages.map(m=>({role:m.role,content:m.content}))})
      });
      if(!resp.ok) throw new Error(`API error ${resp.status}`);
      const d=await resp.json();
      setMessages(m=>[...m,{role:"assistant",content:d.content?.[0]?.text||"Sorry, couldn't generate a response."}]);
    } catch(e) {
      setMessages(m=>[...m,{role:"assistant",content:`Error: ${e.message}`}]);
    } finally {setAiLoading(false);}
  };

  useEffect(()=>{messagesEndRef.current?.scrollIntoView({behavior:"smooth"});},[messages,aiLoading]);

  const QUICK=[
    "How am I doing overall?",
    "Can I afford a big purchase this month?",
    "How should I prioritize my loans?",
    "Help me plan next month's budget",
  ];

  return (
    <S className="px-5 pb-10">
      {/* Projected Position */}
      <G className="mt-5" p="p-5">
        <span className="text-[10px] font-bold tracking-[0.2em]" style={{color:C.dim}}>PROJECTED POSITION</span>
        <div className="flex gap-3 mt-3">
          <div className="flex-1 text-center py-3 rounded-xl" style={{background:"rgba(255,255,255,0.03)"}}>
            <Num value={data.checkingBalance||0} className="text-xl font-bold" color={C.text}/>
            <p className="text-[9px] font-bold tracking-[0.15em] mt-1" style={{color:C.dim}}>CHECKING NOW</p>
          </div>
          <div className="flex-1 text-center py-3 rounded-xl" style={{background:"rgba(255,255,255,0.03)"}}>
            <Num value={projChecking} className="text-xl font-bold" color={projChecking<0?C.red:C.emerald}/>
            <p className="text-[9px] font-bold tracking-[0.15em] mt-1" style={{color:C.dim}}>AFTER PLANNED</p>
            {totalPlanned>0&&<p className="text-[9px] mt-0.5" style={{color:C.amber}}>−{$(totalPlanned)} out</p>}
          </div>
        </div>
      </G>

      {/* Planned Expenses */}
      <div className="mt-5 mb-2 flex items-center justify-between">
        <span className="text-[10px] font-bold tracking-[0.2em]" style={{color:C.dim}}>UPCOMING EXPENSES</span>
        <button onClick={()=>setAddOpen(true)} className="text-[10px] font-bold tracking-wider px-3 py-1 rounded-full transition" style={{color:C.blue,background:`${C.blue}15`}}>+ ADD</button>
      </div>
      {planned.length===0?(
        <G p="p-5"><p className="text-xs text-center" style={{color:C.muted}}>No planned expenses yet. Add upcoming bills, purchases, or goals to see their impact.</p></G>
      ):(
        <G p="px-4 py-0">
          {planned.map((e,i)=>(
            <div key={e.id} className="flex items-center py-3" style={{borderBottom:i<planned.length-1?`1px solid ${C.border}`:"none"}}>
              <div className="w-2 h-2 rounded-full mr-3 flex-shrink-0" style={{background:C.cats[e.cat]||C.amber}}/>
              <div className="flex-1 min-w-0">
                <p className="text-sm text-gray-200 truncate">{e.desc}</p>
                <p className="text-[10px]" style={{color:C.muted}}>{e.cat} · {e.date}</p>
              </div>
              <span className="text-sm font-bold text-white mr-3" style={{fontFamily:"'JetBrains Mono',monospace"}}>{$(e.amount)}</span>
              <button onClick={()=>handleRemove(e.id)} className="w-5 h-5 rounded-full flex items-center justify-center text-[10px]" style={{color:C.red,background:`${C.red}10`}}>✕</button>
            </div>
          ))}
          <div className="flex justify-between py-3" style={{borderTop:`1px solid rgba(255,255,255,0.08)`,margin:"0 -16px",padding:"12px 16px",background:"rgba(255,255,255,0.015)"}}>
            <span className="text-xs font-bold" style={{color:C.text}}>Total planned</span>
            <span className="text-xs font-bold" style={{color:C.amber,fontFamily:"'JetBrains Mono',monospace"}}>{$(totalPlanned)}</span>
          </div>
        </G>
      )}

      {/* AI Advisor */}
      <div className="mt-6 mb-3 flex items-center gap-2">
        <div className="relative w-2 h-2"><div className="absolute inset-0 rounded-full animate-ping opacity-40" style={{background:C.purple}}/><div className="w-2 h-2 rounded-full" style={{background:C.purple}}/></div>
        <span className="text-[10px] font-bold tracking-[0.2em]" style={{color:C.dim}}>AI ADVISOR</span>
      </div>

      {messages.length===0&&(
        <div className="flex flex-col gap-2 mb-4">
          {QUICK.map(p=>(
            <button key={p} onClick={()=>sendMessage(p)} className="text-left text-[12px] px-4 py-3 rounded-xl transition active:scale-[0.98]"
              style={{background:C.surface,border:`1px solid ${C.border}`,color:C.text}}>{p}</button>
          ))}
        </div>
      )}

      {messages.length>0&&(
        <G p="p-4" className="mb-3">
          <div className="space-y-4 max-h-96 overflow-y-auto">
            {messages.map((m,i)=>(
              <div key={i} className={`flex ${m.role==="user"?"justify-end":"justify-start"}`}>
                <div className="max-w-[88%] rounded-2xl px-4 py-3 text-xs leading-relaxed"
                  style={{background:m.role==="user"?`${C.blue}20`:"rgba(255,255,255,0.04)",border:`1px solid ${m.role==="user"?`${C.blue}30`:C.border}`,color:m.role==="user"?C.blue:C.text,whiteSpace:"pre-wrap",fontFamily:m.role==="user"?undefined:"'JetBrains Mono',monospace",fontSize:"11px"}}>
                  {m.content}
                </div>
              </div>
            ))}
            {aiLoading&&(
              <div className="flex justify-start">
                <div className="rounded-2xl px-4 py-3" style={{background:"rgba(255,255,255,0.04)",border:`1px solid ${C.border}`}}>
                  <div className="flex gap-1.5 items-center">
                    {[0,1,2].map(i=><div key={i} className="w-1.5 h-1.5 rounded-full" style={{background:C.purple,animation:`fadeUp 1s ${i*0.15}s ease-in-out infinite alternate`}}/>)}
                  </div>
                </div>
              </div>
            )}
            <div ref={messagesEndRef}/>
          </div>
        </G>
      )}

      <div className="flex gap-2">
        <input value={input} onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage(input);}}}
          placeholder="Ask your advisor anything..."
          className="flex-1 rounded-xl px-4 py-3 text-sm text-white placeholder-gray-600 outline-none"
          style={{background:C.surface,border:`1px solid ${C.border}`}}/>
        <button onClick={()=>sendMessage(input)} disabled={!input.trim()||aiLoading}
          className="w-12 h-12 rounded-xl flex items-center justify-center flex-shrink-0 transition active:scale-95 disabled:opacity-40"
          style={{background:`linear-gradient(135deg,${C.blue},${C.purple})`}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      {messages.length>0&&<button onClick={()=>setMessages([])} className="w-full mt-2 py-2 text-[11px]" style={{color:C.muted}}>Clear conversation</button>}

      <Modal open={addOpen} onClose={()=>setAddOpen(false)} title="Add Planned Expense">
        <Input label="DESCRIPTION" value={newExp.desc} onChange={v=>setNewExp({...newExp,desc:v,cat:autoCat(v)})} placeholder="New tires, dentist bill…"/>
        <Input label="AMOUNT" type="number" value={newExp.amount} onChange={v=>setNewExp({...newExp,amount:v})} placeholder="350.00"/>
        <Input label="DATE" type="date" value={newExp.date} onChange={v=>setNewExp({...newExp,date:v})}/>
        <div className="mb-3">
          <label className="text-[10px] font-bold tracking-[0.15em] block mb-1.5" style={{color:C.dim}}>CATEGORY</label>
          <select value={newExp.cat} onChange={e=>setNewExp({...newExp,cat:e.target.value})}
            className="w-full rounded-xl px-4 py-3 text-sm text-white outline-none" style={{background:C.surface,border:`1px solid ${C.border}`}}>
            {["Groceries","Dining","Gas","Entertainment","Shopping","Medical","Other"].map(c=><option key={c} value={c} style={{background:"#0F172A"}}>{c}</option>)}
          </select>
        </div>
        <Btn full onClick={handleAddExpense} className="mt-2">Add Expense</Btn>
      </Modal>
    </S>
  );
}

// ── API KEY HELPERS ───────────────────────────────────────────────────────────
function getApiKey() { try { return localStorage.getItem("pulse-api-key")||""; } catch { return ""; } }
function setApiKey(k) { try { localStorage.setItem("pulse-api-key", k); } catch {} }

// ── SETTINGS TAB ─────────────────────────────────────────────────────────────
function SettingsTab({data,onUpdate}) {
  const [key,setKey]=useState(getApiKey);
  const [saved,setSaved]=useState(false);
  const [show,setShow]=useState(false);

  const handleSave=()=>{
    const trimmed = key.trim();
    setApiKey(trimmed);
    // Read back immediately to verify it actually saved
    const readBack = getApiKey();
    if(readBack === trimmed && trimmed.length > 0) {
      setSaved(true);
      setTimeout(()=>setSaved(false),3000);
    } else {
      setSaved(false);
      alert("Storage failed — your browser may be blocking localStorage. Try disabling private/incognito mode.");
    }
  };

  return (
    <div className="pb-4">
      <G className="mb-3" p="p-5">
        <div className="flex items-center gap-3 mb-4">
          <div className="w-10 h-10 rounded-xl flex items-center justify-center" style={{background:"rgba(99,102,241,0.12)"}}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={C.blue} strokeWidth="1.8"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          </div>
          <div>
            <p className="text-sm font-bold text-white">Anthropic API Key</p>
            <p className="text-[11px]" style={{color:C.muted}}>Required for Scan & Upload features</p>
          </div>
        </div>
        <div className="relative mb-3">
          <input
            type={show?"text":"password"}
            value={key}
            onChange={e=>setKey(e.target.value)}
            placeholder="sk-ant-api03-..."
            className="w-full rounded-xl px-4 py-3 text-sm text-white placeholder-gray-600 outline-none pr-12"
            style={{background:"rgba(255,255,255,0.04)",border:`1px solid ${C.border}`,fontFamily:"'JetBrains Mono',monospace",fontSize:"12px"}}
          />
          <button onClick={()=>setShow(!show)} className="absolute right-3 top-1/2 -translate-y-1/2 p-1" style={{color:C.muted}}>
            {show
              ? <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              : <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            }
          </button>
        </div>
        <Btn full onClick={handleSave} color={saved?C.emerald:C.blue}>
          {saved?"✓ Saved":"Save API Key"}
        </Btn>
        {saved&&<p className="text-[11px] mt-2 text-center" style={{color:C.emerald}}>
          Stored: {key.slice(0,12)}...{key.slice(-4)}
        </p>}
        <p className="text-[10px] mt-3 text-center leading-relaxed" style={{color:C.dim}}>
          Stored on this device only. Never sent to GitHub or any server other than Anthropic's API.
        </p>
      </G>

      <G className="mb-3" p="p-5">
        <p className="text-[10px] font-bold tracking-[0.2em] mb-3" style={{color:C.dim}}>CYCLE SETTINGS</p>
        {[["Cycle Start",data.cycleStart],["Cycle End",data.cycleEnd],["Monthly Budget",`$${data.cycleTarget}`],["Monthly Income",`$${data.monthlyIncome}`]].map(([l,v])=>(
          <div key={l} className="flex justify-between py-2.5" style={{borderBottom:`1px solid ${C.border}`}}>
            <span className="text-xs" style={{color:C.muted}}>{l}</span>
            <span className="text-xs font-bold text-white" style={{fontFamily:"'JetBrains Mono',monospace"}}>{v}</span>
          </div>
        ))}
      </G>
      <G p="p-5">
        <p className="text-[10px] font-bold tracking-[0.2em] mb-3" style={{color:C.dim}}>DATA</p>
        <button onClick={()=>{if(confirm("Reset all data to defaults? This cannot be undone.")){localStorage.removeItem("pulse-data");window.location.reload();}}}
          className="w-full py-3 rounded-xl text-sm font-bold transition" style={{color:C.red,background:`${C.red}10`,border:`1px solid ${C.red}20`}}>
          Reset All Data
        </button>
      </G>
    </div>
  );
}

function App() {
  const [tab,setTab]=useState("home");
  const [data,setData]=useState(DEFAULTS);
  const [ready,setReady]=useState(false);
  const [toast,setToast]=useState(null);
  const [settingsOpen,setSettingsOpen]=useState(false);
  const [menuOpen,setMenuOpen]=useState(false);
  const [updateReady,setUpdateReady]=useState(false);
  const waitingSW=useRef(null);
  const toastTimer=useRef(null);

  const showToast=(msg)=>{
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current=setTimeout(()=>setToast(null),2500);
  };

  const handleUpdate=()=>{
    if(waitingSW.current) waitingSW.current.postMessage('SKIP_WAITING');
  };

  useEffect(()=>{
    const handler=(e)=>{waitingSW.current=e.detail;setUpdateReady(true);};
    window.addEventListener('swUpdateReady',handler);
    return()=>window.removeEventListener('swUpdateReady',handler);
  },[]);

  const onUpdate=(newData)=>{setData(newData);saveState(newData);};

  const onAddTransaction=(txn)=>{
    const newData={...data,
      balance:data.balance+txn.amount,
      transactions:[txn,...data.transactions]
    };
    onUpdate(newData);
    showToast(`${$(txn.amount)} · ${txn.desc} · ${txn.cat}`);
  };

  const onImportTransactions=(txns)=>{
    if(!txns.length) return;
    const total=txns.reduce((s,t)=>s+t.amount,0);
    const newData={...data,
      balance:data.balance+total,
      transactions:[...txns,...data.transactions]
    };
    onUpdate(newData);
    showToast(`Imported ${txns.length} transactions · ${$(total)}`);
  };

  // Load persisted state, then try live data, then handle share target
  useEffect(()=>{
    (async()=>{
      const saved = await loadState();
      if(saved) {
        const fresh = computeCycleDays(saved.cycleStart||CYCLE_START, saved.cycleEnd||CYCLE_END);
        // If cycle rolled over, reset balance and transactions for new cycle
        const newCycle = fresh.cycleStart !== saved.cycleStart;
        setData({...saved, ...fresh, ...(newCycle ? {balance:0, transactions:[]} : {})});
      }
      try { const r=await fetch(DATA_URL); if(r.ok){const d=await r.json();const fresh=computeCycleDays(d.cycleStart||CYCLE_START,d.cycleEnd||CYCLE_END);setData({...d,...fresh});} } catch{}

      // Web Share Target — read ?text= param from URL
      const params=new URLSearchParams(window.location.search);
      const sharedText=params.get("text");
      if(sharedText){
        // Clean URL without reloading
        window.history.replaceState({},"",window.location.pathname);
        const parsed=parseDiscoverNotif(decodeURIComponent(sharedText));
        if(parsed){
          onAddTransaction(parsed);
          setTab("home");
        } else {
          // Partial parse — merchant might still be useful, open quick-add
          setTab("home");
          showToast("Couldn't parse notification — use + to add manually");
        }
      }

      setReady(true);
    })();
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[]);

  // Persist on changes — handled by onUpdate above

  return (
    <div style={{position:"fixed",inset:0,display:"flex",flexDirection:"column",background:`linear-gradient(180deg,${C.bg},#0c1628)`,fontFamily:"'Poppins',sans-serif"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        @keyframes ping{75%,100%{transform:scale(2);opacity:0}}
        @keyframes toastIn{from{opacity:0;transform:translateY(-20px) scale(0.96)}to{opacity:1;transform:translateY(0) scale(1)}}
        .animate-ping{animation:ping 1.5s cubic-bezier(0,0,0.2,1) infinite}
        *{-webkit-tap-highlight-color:transparent}::-webkit-scrollbar{display:none}
        .safe-top{padding-top:max(20px, env(safe-area-inset-top))}
      `}</style>

      <Toast toast={toast}/>

      {updateReady&&(
        <div className="fixed top-0 left-0 right-0 z-[300] flex justify-center pointer-events-none" style={{paddingTop:"max(16px, env(safe-area-inset-top))"}}>
          <div className="mx-4 max-w-sm w-full rounded-2xl overflow-hidden flex items-center gap-3 pointer-events-auto"
            style={{background:"rgba(15,23,42,0.97)",border:`1px solid rgba(99,102,241,0.4)`,backdropFilter:"blur(20px)",boxShadow:`0 8px 40px rgba(0,0,0,0.6)`,animation:"toastIn 0.4s cubic-bezier(0.16,1,0.3,1) both"}}>
            <div className="w-1 self-stretch flex-shrink-0" style={{background:C.blue}}/>
            <div className="py-3 flex-1">
              <p className="text-xs font-bold text-white">Update Available</p>
              <p className="text-[11px] mt-0.5" style={{color:C.muted}}>A new version of Pulse is ready</p>
            </div>
            <button onClick={handleUpdate} className="mr-3 px-4 py-2 rounded-xl text-[11px] font-bold transition active:scale-95" style={{background:C.blue,color:"#fff"}}>Restart</button>
          </div>
        </div>
      )}

      {/* ── HEADER (fixed height, never scrolls) */}
      <div className="safe-top px-5 pb-2 flex items-center justify-between flex-shrink-0">
        <div className="flex items-center gap-3">
          {/* P mark icon */}
          <svg width="38" height="38" viewBox="0 0 44 44" style={{flexShrink:0}}>
            <defs>
              <linearGradient id="ps1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stopColor="#e0e7ff"/>
                <stop offset="30%" stopColor="#818CF8"/>
                <stop offset="65%" stopColor="#6366F1"/>
                <stop offset="100%" stopColor="#3730a3"/>
              </linearGradient>
              <linearGradient id="pm1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stopColor="#c7d2fe"/>
                <stop offset="100%" stopColor="#312e81"/>
              </linearGradient>
              <linearGradient id="pd1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stopColor="#4338ca"/>
                <stop offset="100%" stopColor="#1e1b4b"/>
              </linearGradient>
              <linearGradient id="ptile" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stopColor="#1e1b4b"/>
                <stop offset="100%" stopColor="#0F172A"/>
              </linearGradient>
            </defs>
            <rect width="44" height="44" rx="10" fill="url(#ptile)"/>
            <polygon points="7,4 14,4 14,40 7,40" fill="url(#ps1)"/>
            <polygon points="14,4 31,4 29,9 14,9" fill="url(#ps1)"/>
            <polygon points="31,4 36,12 32,12 29,9" fill="#e0e7ff"/>
            <polygon points="36,12 36,22 32,22 32,12" fill="url(#pm1)"/>
            <polygon points="36,22 31,30 29,27 32,22" fill="url(#pd1)"/>
            <polygon points="14,27 29,27 31,30 14,30" fill="url(#pd1)"/>
            <polygon points="14,9 29,9 32,12 32,22 29,27 14,27 14,22 26,22 29,18 26,13 14,13" fill="url(#ptile)"/>
            <line x1="7" y1="4" x2="7" y2="40" stroke="#e0e7ff" strokeWidth="1" opacity="0.7"/>
            <line x1="7" y1="4" x2="31" y2="4" stroke="#e0e7ff" strokeWidth="1" opacity="0.6"/>
          </svg>
          <div>
            <div className="flex items-center gap-1.5">
              <span style={{fontFamily:"'Helvetica Neue',Helvetica,Arial,sans-serif",fontSize:"17px",fontWeight:"300",letterSpacing:"4px",color:"white"}}>PULSE</span>
              <span className="relative flex h-2 w-2 ml-0.5">
                <span className="animate-ping absolute inline-flex h-full w-full rounded-full opacity-50" style={{background:C.emerald}}/>
                <span className="relative inline-flex rounded-full h-2 w-2" style={{background:C.emerald}}/>
              </span>
            </div>
            <p className="text-[10px]" style={{color:C.dim}}>Mar 15 – Apr 15 · Day {data.daysElapsed}/{data.totalDays}</p>
          </div>
        </div>
        <button onClick={()=>setSettingsOpen(true)} className="w-9 h-9 rounded-full flex items-center justify-center text-[11px] font-bold transition active:scale-95" style={{background:"linear-gradient(135deg,#818CF8,#6366F1)",color:"#fff"}}>KG</button>
      </div>

      {/* Settings Modal */}
      <Modal open={settingsOpen} onClose={()=>setSettingsOpen(false)} title="Settings">
        <SettingsTab data={data} onUpdate={onUpdate}/>
      </Modal>

      {/* ── CONTENT (scrollable region only) */}
      <div key={tab} style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",overscrollBehavior:"none",animation:"fadeUp 0.35s ease both"}}>
        {tab==="home"&&<Home data={data} onUpdate={onUpdate} onAddTransaction={onAddTransaction} onImportTransactions={onImportTransactions} menuOpen={menuOpen} setMenuOpen={setMenuOpen}/>}
        {tab==="spend"&&<SpendTab data={data}/>}
        {tab==="loan"&&<LoansTab data={data} onUpdate={onUpdate}/>}
        {tab==="hp"&&<HealthTab data={data} onUpdate={onUpdate}/>}
        {tab==="plan"&&<PlanTab data={data} onUpdate={onUpdate}/>}
      </div>

      {/* ── NAV (fixed height, never scrolls) */}
      <div className="flex-shrink-0 relative" style={{background:"rgba(15,23,42,0.98)",backdropFilter:"blur(24px)",borderTop:`1px solid ${C.border}`,paddingBottom:"calc(env(safe-area-inset-bottom) - 35px)"}}>
        {/* Floating + button centered above nav */}
        <button onClick={()=>setMenuOpen(true)}
          className="absolute w-12 h-12 rounded-full flex items-center justify-center transition-all active:scale-95"
          style={{left:"50%",transform:"translateX(-50%)",bottom:"calc(100% + 10px)",background:`linear-gradient(135deg,${C.blue},${C.purple})`,boxShadow:`0 0 28px -4px ${C.blue}90`,zIndex:10}}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <div className="flex justify-around items-center max-w-lg mx-auto pt-1 pb-0">
          {NAV.map(n=>(
            <button key={n.id} onClick={()=>setTab(n.id)} className="flex flex-col items-center gap-0 px-3 transition-all duration-200" style={{color:tab===n.id?C.blue:C.dim}}>
              <div style={{transform:tab===n.id?"scale(1.12)":"scale(1)",transition:"transform 0.2s"}}>
                {React.cloneElement(n.i,{width:22,height:22})}
              </div>
              {tab===n.id&&<span style={{fontSize:"8px",fontWeight:"700",letterSpacing:"0.08em",color:C.blue}}>{n.l}</span>}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/pulse/sw.js').then(reg => {
          reg.update();
          reg.addEventListener('updatefound', () => {
            const newSW = reg.installing;
            newSW.addEventListener('statechange', () => {
              // When a new SW is ready and waiting, notify React instead of auto-activating
              if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                window.dispatchEvent(new CustomEvent('swUpdateReady', { detail: newSW }));
              }
            });
          });
        }).catch(() => {});
        // Reload once the new SW takes control (triggered by Restart button)
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          window.location.reload();
        });
      });
    }
  </script>
